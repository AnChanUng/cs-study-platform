spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/cs_study}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: simple

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope: openid, profile, email

server:
  port: 8080

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/YOUR/WEBHOOK/URL}
  enabled: ${SLACK_ENABLED:false}
  morning-cron: "0 20 8 * * *"
  evening-cron: "0 10 18 * * *"
  weekly-cron: "0 0 9 * * MON"

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:cs-study-platform-jwt-secret-key-must-be-at-least-32-chars}
    expiration-ms: 604800000

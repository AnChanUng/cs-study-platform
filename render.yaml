databases:
  - name: cs-study-db
    plan: free
    databaseName: cs_study
    user: cs_study_user

services:
  - type: web
    name: cs-study-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SLACK_ENABLED
        value: "false"
      - key: APP_BASE_URL
        value: https://cs-study-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cs-study-db
          property: connectionURI

  - type: web
    name: cs-study-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cs-study-backend.onrender.com/api/v1
